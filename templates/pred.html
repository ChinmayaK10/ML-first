<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Price Prediction</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            padding: 20px;
        }
        .form-container {
            background: white;
            padding: 20px;
            max-width: 500px;
            margin: auto;
            border-radius: 10px;
        }
        input, select {
            width: 100%;
            color: red;
            padding: 8px;
            margin-top: 8px;
        }
        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            background: blue;
            color: white;
            border: none;
        }
        h2 {
            text-align: center;
        }
    </style>

</head>
<body>

<div class="form-container">
    <h2>Car Information Form</h2>

    <!-- FIXED ACTION -->
    <form action="/predict" method="post">

        <select name="model" required>
    <option value="7 Series">7 Series</option>
    <option value="i3">i3</option>
    <option value="i8">i8</option>
    <option value="3 Series">3 Series</option>
    <option value="5 Series">5 Series</option>
    <option value="X1">X1</option>
    <option value="X3">X3</option>
    <option value="X5">X5</option>
    <option value="M5">M5</option>
    <option value="X6">X6</option>
    <option value="M3">M3</option>
</select>

        <label>Year:</label>
        <input type="number" name="year" required>

        <label>Engine Size (L):</label>
        <input type="number" step="0.1" name="engine_size_l" required>

        <label>Mileage (KM):</label>
        <input type="number" name="mileage_km" required>

        <label>Price (USD):</label>
        <input type="number" name="price_usd" required>

        <label>Region:</label>
        <input type="text" name="region">

        <label>Color:</label>
        <input type="password" name="password">

        <label>Fuel Type:</label>
        <select name="fuel_type">
            <option value="Petrol">Petrol</option>
            <option value="Diesel">Diesel</option>
            <option value="Electric">Electric</option>
            <option value="Hybrid">Hybrid</option>
        </select>

        <label>Transmission:</label>
        <select name="transmission">
            <option value="Manual">Manual</option>
            <option value="Automatic">Automatic</option>
        </select>

        <button type="submit">Predict</button>

    </form>
</div>

<!-- FIXED RESULT DISPLAY -->
    {{if result ==NONE}}
    
    <h2>Prediction: {{result}}</h2>


</body>
</html>
